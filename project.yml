name: RockinBod
options:
  bundleIdPrefix: com.rockinbod8374
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  RockinBod:
    type: application
    platform: iOS
    sources:
      - path: RockinBod
    settings:
      base:
        INFOPLIST_FILE: RockinBod/Info.plist
        CODE_SIGN_ENTITLEMENTS: RockinBod/RockinBod.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.rockinbod8374.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: true
    entitlements:
      path: RockinBod/RockinBod.entitlements

  RockinBodTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RockinBodTests
    dependencies:
      - target: RockinBod
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rockinbod8374.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RockinBod.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RockinBod"
        BUNDLE_LOADER: "$(TEST_HOST)"
